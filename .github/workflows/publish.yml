name: Publish to npm

on:
  push:
    branches:
      - main

# Evita publicaciones simultáneas si se hacen varios push seguidos.
concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          always-auth: true

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish to npm if version changed
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "Local version: $NAME@$VERSION"
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "✓ $NAME@$VERSION ya está publicado. Nada que hacer."
          else
            echo "→ Publicando $NAME@$VERSION ..."
            npm publish --access=public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
